<!DOCTYPE html>
<html lang="en">
<head>

    <title>Profile Card</title>
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <!-- leftside: Logo Name -->
         <div class="logo">
            Divya.dev
         </div>
         <!-- right side: Auth button -->
          <div class="nav-auth">
            <a href="login.html" class="btn-login">Login</a>
            <a href="signin.html" class="btn-signin">Sign In</a>
          </div>
    </nav>
    <div class="card">
        <!-- Profile image -->
        <div class="pro-Image">
            <img src="divPro.jpeg" alt="Profile Image">

        </div>

        <!-- name ke liye section  -->
         <h2 class="name">Divya Bhoyar</h2>

         <!-- Bio -->
          <p class="bio">Software Engineer with a passion for creating innovative solutions.</p>

          <!-- Social icons -->
          <div class="social-icons">
              <a href="#" target="_blank"><i class="fab fa-twitter"></i></a>
              <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
              <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
              <a href="#" target="_blank"><i class="fab fa-github"></i></a>
          </div>

          <!-- buttons -->
          <div class="buttons">
              <button class="btn">Follow</button>
              <button class="btn">Message</button>
          </div>

    </div>
    
</body>
</html>
