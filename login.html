<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Divya.dev</title>
    <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- TOP NAVBAR (Bilkul pehle jaisa) -->
    <nav class="navbar">
        <div class="logo">Divya.dev</div>
        <div class="nav-auth">
            <!-- Kyunki hum login page par hain, toh signin par click karke signin page khulega -->
            <a href="signin.html" class="btn-signin">Sign Up</a>
        </div>
    </nav>

    <!-- LOGIN CARD BOX -->
    <div class="card">
        <h2 class="form-title">Welcome Back</h2>
        
        <!-- Input Group 1: Email -->
        <div class="input-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" placeholder="Enter your email">
        </div>
        
        <!-- Input Group 2: Password -->
        <div class="input-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" placeholder="Enter your password">
        </div>
        
        <!-- Login Submit Button (Wahi green color ka button) -->
        <button class="btn-submit">Log In</button>
        
        <!-- Bottom Link -->
        <p class="form-footer">Don't have an account? <a href="signin.html">Sign Up</a></p>
    </div>

</body>
</html>
